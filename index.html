<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>6000 days💖</title>
<link rel="icon:🌹">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    overflow-x: hidden;
    background: radial-gradient(circle at center, #ff758c, #ff7eb3);
    color: white;
    text-align: center;
}

/* 3D Title */
h1 {
    margin-top: 15vh;
    font-size: 8vw; /* 🔥 responsive */
    letter-spacing: 2px;
    animation: floatText 3s ease-in-out infinite;
}

h2 {
    font-size: 5vw; /* 🔥 responsive */
}

@keyframes floatText {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
}

/* Floating Hearts */
.heart {
    position: absolute;
    font-size: 6vw; /* 🔥 responsive */
    animation: float 6s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateY(-10vh) scale(1.3); opacity: 0; }
}

/* Glass Card */
.card {
    margin: 60px auto;
    width: 90%; /* 🔥 responsive */
    max-width: 400px;
    padding: 20px;
    border-radius: 25px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 30px rgba(255,255,255,0.5);
    transition: transform 0.5s;
}

.card:hover {
    transform: rotateY(10deg) scale(1.05);
}


/* Button */
button {
    padding: 12px 25px;
    font-size: 4.5vw; /* 🔥 responsive */
    border: none;
    border-radius: 30px;
    background: #ff4d6d;
    color: white;
    cursor: pointer;
    box-shadow: 0 0 15px #fff;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

/* Hidden surprise */
#surprise {
    display: none;
    font-size: 6vw; /* 🔥 responsive */
    margin-top: 20px;
    

}
    
.no-underline {
    text-decoration: none;
    color: inherit;
}

</style>

</head>

<body>

<!-- Hearts -->
<div class="heart" style="left:10%;">❤️</div>
<div class="heart" style="left:30%;animation-duration:7s;">💖</div>
<div class="heart" style="left:50%;animation-duration:5s;">💘</div>
<div class="heart" style="left:70%;animation-duration:6s;">❤️</div>
<div class="heart" style="left:90%;animation-duration:8s;">💝</div>

<h1>Welcome To The 6000 Day Of Your Life, Kavya💖</h1>

un life full ah ipdiye sirichu santhosama irukanum Kavya 💕</h2>

</body>
</html>
