<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6000 Video</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    overflow-x: hidden;
    background: radial-gradient(circle at center, #ff758c, #ff7eb3, #6a0572);
    color: white;
    text-align: center;
}

/* Heading */
h1 {
    margin-top: 20px;
    font-size: 28px;
    text-shadow: 0 0 10px #fff, 0 0 20px #ff4d6d;
}

/* Button */
h2 {
    display: inline-block;
    padding: 10px 20px;
    border-radius: 25px;
    background: linear-gradient(45deg, #ff4d6d, #ff9a9e);
    box-shadow: 0 0 15px rgba(255,77,109,0.6);
}

/* Card */
.card {
    margin-top: 20px;
    padding: 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 30px rgba(255,255,255,0.2);
}

/* Video */
video {
    border-radius: 15px;
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
}

/* Text */
h3 {
    margin-top: 10px;
    color: #ffe6f0;
}

/* Effects */
.flower, .confetti {
    position: fixed;
    top: -10vh;
    z-index: 999;
}

.flower {
    font-size: 22px;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(720deg);
    }
}
</style>
</head>

<body>

<div class="card">
    <video width="300" height="600" controls>
        <source src="kavinn.mp4" type="video/mp4">
    </video>
    <h3>Every moment with you… feels like magic 💖</h3>
</div>

<br>

<a href="card.html"><h2>Final Ha oru click kavya💌</h2></a>

<script>
window.onload = function() {

    // flowers
    for (let i = 0; i < 10; i++) {
        let f = document.createElement("div");
        f.className = "flower";
        f.innerHTML = ["🌸","🌺","🌻","🌹"][Math.floor(Math.random()*4)];
        f.style.left = Math.random() * 100 + "vw";
        f.style.animationDuration = (2 + Math.random()*3) + "s";
        document.body.appendChild(f);
        setTimeout(() => f.remove(), 7000);
    }

    // confetti
    for (let i = 0; i < 10; i++) {
        let c = document.createElement("div");
        c.className = "confetti";
        c.style.background = ["red","yellow","blue","green","pink","orange"][Math.floor(Math.random()*6)];
        c.style.left = Math.random() * 100 + "vw";
        c.style.animationDuration = (3 + Math.random()*3) + "s";
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 6000);
    }
};
</script>

</body>
</html>
